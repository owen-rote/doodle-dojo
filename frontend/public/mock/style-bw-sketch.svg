<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Background -->
  <rect width="300" height="300" rx="16" fill="#1a1a2e"/>
  <!-- Simplified cat - black & white sketch style with hatching -->
  <!-- Body outline -->
  <ellipse cx="150" cy="195" rx="70" ry="60" stroke="white" stroke-width="2.5" fill="none" stroke-dasharray="none"/>
  <!-- Body hatching -->
  <line x1="100" y1="185" x2="110" y2="205" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="115" y1="175" x2="120" y2="210" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="130" y1="170" x2="132" y2="215" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="165" y1="170" x2="168" y2="215" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="180" y1="175" x2="183" y2="210" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="195" y1="185" x2="198" y2="205" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <!-- Head outline -->
  <circle cx="150" cy="120" r="50" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Left ear -->
  <polygon points="110,80 95,40 130,70" stroke="white" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <line x1="105" y1="65" x2="118" y2="75" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <line x1="100" y1="55" x2="122" y2="73" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <!-- Right ear -->
  <polygon points="190,80 205,40 170,70" stroke="white" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <line x1="195" y1="65" x2="182" y2="75" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <line x1="200" y1="55" x2="178" y2="73" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="130" cy="115" rx="10" ry="12" stroke="white" stroke-width="2" fill="white"/>
  <ellipse cx="130" cy="115" rx="5" ry="6" fill="#1a1a2e"/>
  <ellipse cx="170" cy="115" rx="10" ry="12" stroke="white" stroke-width="2" fill="white"/>
  <ellipse cx="170" cy="115" rx="5" ry="6" fill="#1a1a2e"/>
  <!-- Nose -->
  <ellipse cx="150" cy="132" rx="6" ry="4" stroke="white" stroke-width="2" fill="none"/>
  <!-- Mouth -->
  <path d="M144 138 Q150 146 156 138" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="100" y1="128" x2="130" y2="130" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="138" x2="130" y2="136" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="200" y1="128" x2="170" y2="130" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="200" y1="138" x2="170" y2="136" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M220 195 Q240 160 230 130" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Sketch-style scribble marks -->
  <line x1="85" y1="250" x2="215" y2="250" stroke="white" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 6"/>
</svg>
